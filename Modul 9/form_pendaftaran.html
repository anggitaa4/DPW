<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; }
        td { padding: 5px 10px; }
        input, textarea { padding: 4px; }
    </style>
</head>
<body>
    <h2>Form Pendaftaran</h2>
    <form method="POST" action="proses_pendaftaran.php">
        <table>
            <tr>
                <td>Nim:</td>
                <td><input type="text" name="nim" placeholder="nim"></td>
            </tr>
            <tr>
                <td>Nama Lengkap:</td>
                <td><input type="text" name="nama" placeholder="nama"></td>
            </tr>
            <tr>
                <td>E-mail:</td>
                <td><input type="email" name="email" placeholder="email"></td>
            </tr>
            <tr>
                <td>Tempat, Tanggal Lahir:</td>
                <td>
                    <input type="text" name="tempat" placeholder="tempat">
                    <input type="date" name="tgl_lahir">
                </td>
            </tr>
            <tr>
                <td>Alamat:</td>
                <td><input type="text" name="alamat" placeholder="alamat"></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="Laki-Laki"> Laki-Laki
                    <input type="radio" name="gender" value="Perempuan" checked> Perempuan
                    <span>Gender</span>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" name="kirim" value="kirim">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
