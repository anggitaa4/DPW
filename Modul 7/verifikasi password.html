<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Validasi Password</title>

    <style>
        body {
            font-family: Segoe UI;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .pesan {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
        .error {
            color: red;
        }
        .sukses {
            color: green;
        }
        .toggle {
            font-size: 12px;
            cursor: pointer;
            color: #555;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Validasi Password</h2>

    <form name="formTes">
        Password:
        <input type="password" name="password_1" id="pass1">

        Ulangi Password:
        <input type="password" name="password_2" id="pass2">
        <span class="toggle" onclick="togglePassword()"> Tampilkan Password</span>
        <button type="button" onclick="cekPassword()">Proses</button>
        <div id="hasil" class="pesan"></div>
    </form>
</div>

<script>
function cekPassword() {
    let p1 = document.formTes.password_1.value;
    let p2 = document.formTes.password_2.value;
    let hasil = document.getElementById("hasil");

    if (p1 === "" || p2 === "") {
        hasil.innerHTML = "Password tidak boleh kosong!";
        hasil.className = "pesan error";
        return;
    }

    if (p1 !== p2) {
        hasil.innerHTML = "Password tidak sama!";
        hasil.className = "pesan error";
    } else {
        hasil.innerHTML = "Password cocok! Mengalihkan...";
        hasil.className = "pesan sukses";

        setTimeout(() => {
            window.location.href = "alert.html";
        }, 1500);
    }
}
function togglePassword() {
    let p1 = document.getElementById("pass1");
    let p2 = document.getElementById("pass2");

    if (p1.type === "password") {
        p1.type = "text";
        p2.type = "text";
    } else {
        p1.type = "password";
        p2.type = "password";
    }
}
</script>

</body>
</html>
