<!DOCTYPE html>
<html>
<head>
  <title>AJAX & jQuery</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Penjelasan</h2>
<p>AJAX adalah teknik untuk mengambil data tanpa reload halaman.</p>
<p>jQuery adalah library JavaScript untuk mempermudah coding.</p>

<button id="klik">Klik</button>
<p id="hasil"></p>

<script>
$("#klik").click(function(){
  $("#hasil").text("Ini contoh jQuery!");
});
</script>

</body>
</html>
