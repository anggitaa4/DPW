<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hyperlink</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        a {
            text-decoration: none;
            background-color: #FF9933;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 10px 0;
            transition: 0.3s;
        }
        a:visited {
            color: #f2f2f2;
        }
        a:hover {
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: underline;
            background-color: #CCFF00;
            color: black;
        }
        a:active {
            background-color: #660000;
            color: white;
        }
    </style>
</head>
<body>
<h2>Hyperlink</h2>
<a href="#">Klik di sini</a><br>
<a href="#">Arahkan mouse ke sini</a>
</body>
</html>
