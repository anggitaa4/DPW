<!doctype html> 
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Kontak</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { 
      /* warna disesuaikan (senada dengan coklat) */
      background: linear-gradient(135deg, #f7d9c4);
      min-height: 100vh;
    }
    .form-container {
      max-width: 450px;
      margin: auto;
    }
    .card {
      border-radius: 20px;
      border: none;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.7);
    }
    .navbar {
      backdrop-filter: blur(8px);
    }
    .navbar-brand {
      font-weight: bold;
      letter-spacing: 1px;
    }
    h1 {
      font-weight: 700;
      color: #8e3e08;
    }
    .btn-primary {
      background: linear-gradient(45deg, #872709);
      border: none;
      border-radius: 10px;
      transition: 0.3s;
    }
    .btn-primary:hover {
      transform: scale(1.03);
      /* disesuaikan agar tetap satu tema */
      background: linear-gradient(45deg, #d89b6b, #8e3e08);
    }
    .input-group-text {
      background: #792707;
      color: white;
      border: none;
    }
    .form-control {
      border-radius: 0 10px 10px 0;
    }
    .card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }
  </style>
</head>

<body>
<nav class="navbar navbar-dark shadow-sm" style="background:#89280b;">
  <div class="container">
  <a href="index.html" class="navbar-brand">Mendy Website</a>
  </div>
</nav>

<div class="container mt-5">
<h1 class="text-center mb-4"> Form Pesanan</h1>
<div class="form-container">
<div class="card shadow p-4">
<form class="mt-2" onsubmit="window.location.href='index.html'; return false;">
<div class="input-group mb-3">
<span class="input-group-text">
<i class="bi bi-person">

</i>
</span>
<input type="text" class="form-control" placeholder="Nama" required>
</div>
      <div class="input-group mb-3">
      <span class="input-group-text">
      <i class="bi bi-telephone"></i>
</span>
<input type="text" class="form-control" placeholder="No HP" required>
</div>
<div class="input-group mb-3">
          <span class="input-group-text">
            <i class="bi bi-bag"></i>
          </span>
          <input type="text" class="form-control" placeholder="Pesanan" required>
        </div>

        <button class="btn btn-primary w-100">Kirim </button>

      </form>

    </div>
  </div>
</div>

</body>
</html>
