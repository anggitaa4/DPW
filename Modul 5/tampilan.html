<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tampilan Layout CSS Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 150px 1fr 1fr;
            grid-template-rows: auto auto auto;
            grid-gap: 10px;
            background-color: #2196F3;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .grid-item {
            background-color: #e3f2fd;
            border: 2px solid #2196F3;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            color: #333;
        }
        .header {
            grid-column: 1 / 4;
        }
        .menu {
            grid-row: 2 / 4;
            grid-column: 1 / 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main {
            grid-row: 2 / 3;
            grid-column: 2 / 3;
        }
        .right {
            grid-row: 2 / 3;
            grid-column: 3 / 4;
        }
        .footer {
            grid-row: 3 / 4;
            grid-column: 2 / 4;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item header">Header</div>
        <div class="grid-item menu">Menu</div>
        <div class="grid-item main">Main</div>
        <div class="grid-item right">Right</div>
        <div class="grid-item footer">Footer</div>
    </div>

</body>
</html>
