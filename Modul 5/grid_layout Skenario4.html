<!DOCTYPE html>
<html>
<head>
    <title>Grid Skenario 4</title>
    <style>
        .tempat_grid {
            display: grid;
            grid-template-columns: auto auto auto;
            background-color: lightgray;
            padding: 10px;
            grid-gap: 50px;  /* perubahan skenario 4 */
        }
        .item {
            background-color: orange;
            border: 1px solid black;
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
<h2>Grid dengan Gap (Skenario 4)</h2>
<div class="tempat_grid">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
    <div class="item">9</div>
</div>

<p><b>Kesimpulan Skenario 4:</b> 
grid-gap adalah cara  untuk mengatur jarak antar baris dan kolom sekaligus.
Nilai 50px berarti jarak antar semua item (baik baris maupun kolom) sama besar.
</p>

</body>
</html>
