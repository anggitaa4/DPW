<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Perbandingan Grid 4 Kolom</title>
    <style>
        .grid-container1 {
            display: grid;
            grid-template-columns: 70px 300px auto 40px;
            gap: 50px;
            background-color: #2196F3;
            padding: 10px;
        }
        .grid-container2 {
            display: grid;
            grid-template-columns: 10px 500px 20px 10px;
            gap: 50px;
            background-color: #f44336;
            padding: 10px;
        }
        .item {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid black;
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
        .item1 {
            grid-column: 1 / 3;
        }
    </style>
</head>

<body>

    <h2>Grid: 70px 300px auto 40px</h2>
    <div class="grid-container1">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>

    <h2>Grid: 10px 500px 20px 10px</h2>
    <div class="grid-container2">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>

</body>
</html>
