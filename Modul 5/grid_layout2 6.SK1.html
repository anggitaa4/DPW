<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Belajar Grid Layout</title>
    <style>
        .grid-container {
            display: grid;
            grid-gap: 50px;
            background-color: #7ec0f3;
            grid-template-columns: auto auto auto auto;
            padding: 10px;
        }
        /* Skenario 1 */
        .item1 {
            grid-row: 1 / 4;
            background-color: rgba(179, 71, 71, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }

        .item {
            background-color: rgba(179, 71, 71, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>

    <div class="footer-text">Kesimpulan : Penggunaan grid-row: 1 / 4; membuat elemen pertama menjadi lebih tinggi karena menempati tiga baris sekaligus, sehingga elemen lainnya otomatis menyesuaikan posisi dan mengisi ruang kosong di sekitarnya.</div>

</body>
</html>
