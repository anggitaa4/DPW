<!DOCTYPE html>
<html>
<head>
    <title>Inline Grid</title>
    <style>
        .tempat_grid {
            display: inline-grid;
            grid-template-columns: auto auto auto;
            background-color: lightgray;
            padding: 10px;
        }
        .item {
            background-color: orange;
            border: 1px solid black;
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
<h2>Inline Grid Layout</h2>
<div class="tempat_grid">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
    <div class="item">9</div>
</div>

<p><b>Kesimpulan:</b> inline-grid membuat grid dengan lebar elemen hanya mengikuti isi di dalamnya, bukan memenuhi satu baris penuh layar.</p>

</body>
</html>
